<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Altan Group - Gestión de Inversiones</title>

  <style>
    :root {
      --bg: #020617;
      --card: #0f172a;
      --card2: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --primary: #2563eb;
      --primary2: #1d4ed8;
      --danger: #dc2626;
      --success: #16a34a;
      --warning: #f59e0b;
      --border: rgba(148, 163, 184, 0.25);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a);
      color: var(--text);
    }

    header {
      padding: 18px 24px;
      background: rgba(15, 23, 42, 0.95);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 4px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
    }

    main {
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    .card {
      background: rgba(15, 23, 42, 0.88);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 18px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.18);
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .grid-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .grid-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .grid-4 {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #020617;
      color: var(--text);
      outline: none;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
    }

    .field {
      margin-bottom: 12px;
    }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      background: var(--primary);
      color: white;
      cursor: pointer;
      font-weight: 700;
    }

    .btn:hover {
      background: var(--primary2);
    }

    .btn.secondary {
      background: #334155;
    }

    .btn.danger {
      background: var(--danger);
    }

    .btn.success {
      background: var(--success);
    }

    .btn.warning {
      background: var(--warning);
      color: #111827;
    }

    .btn.small {
      padding: 6px 9px;
      font-size: 12px;
      border-radius: 8px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .tab {
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.7);
      color: var(--text);
      cursor: pointer;
    }

    .tab.active {
      background: var(--primary);
      border-color: var(--primary);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
    }

    th, td {
      padding: 11px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
      font-size: 13px;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .table-wrap {
      overflow-x: auto;
    }

    .muted {
      color: var(--muted);
    }

    .small {
      font-size: 12px;
    }

    .positive {
      color: #22c55e;
      font-weight: 700;
    }

    .negative {
      color: #ef4444;
      font-weight: 700;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid var(--border);
    }

    .badge.disponible {
      background: rgba(34,197,94,0.12);
      color: #22c55e;
    }

    .badge.en_compra {
      background: rgba(245,158,11,0.12);
      color: #f59e0b;
    }

    .badge.comprada {
      background: rgba(59,130,246,0.12);
      color: #60a5fa;
    }

    .badge.en_refaccion {
      background: rgba(168,85,247,0.12);
      color: #c084fc;
    }

    .badge.vendida {
      background: rgba(239,68,68,0.12);
      color: #f87171;
    }

    .kpi {
      background: rgba(2, 6, 23, 0.55);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
    }

    .kpi .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .kpi .value {
      font-size: 24px;
      font-weight: 800;
    }

    .result-bars {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .result-bar-item {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      background: rgba(2, 6, 23, 0.45);
    }

    .result-bar-title {
      font-weight: 700;
      margin-bottom: 10px;
    }

    .result-bar-row {
      display: grid;
      grid-template-columns: 170px 1fr 140px;
      align-items: center;
      gap: 10px;
      margin: 8px 0;
    }

    .result-bar-label {
      font-size: 13px;
      color: var(--muted);
    }

    .result-bar-track {
      height: 18px;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.18);
      overflow: hidden;
    }

    .result-bar-fill {
      height: 100%;
      border-radius: 999px;
    }

    .result-bar-fill.investment {
      background: linear-gradient(90deg, #f59e0b, #f97316);
    }

    .result-bar-fill.sale {
      background: linear-gradient(90deg, #22c55e, #14b8a6);
    }

    .result-bar-value {
      text-align: right;
      font-size: 13px;
      font-weight: 700;
    }

    .notice {
      padding: 12px;
      border-radius: 12px;
      background: rgba(37, 99, 235, 0.12);
      border: 1px solid rgba(37, 99, 235, 0.35);
      color: #bfdbfe;
      font-size: 13px;
      margin-bottom: 14px;
    }

    @media (max-width: 900px) {
      .grid-2, .grid-3, .grid-4 {
        grid-template-columns: 1fr;
      }

      .result-bar-row {
        grid-template-columns: 1fr;
      }

      .result-bar-value {
        text-align: left;
      }
    }
  </style>
</head>

<body>
  <div id="app"></div>

  <script>
    const STORAGE_KEY = "altan_group_inversiones_v3";

    let state = null;
    let currentUser = null;
    let activeTab = "inicio";
    let editing = {
      propertyId: null,
      purchaseId: null,
      renovationId: null,
      saleId: null
    };

    const initialUsers = [
      { id: "gaston", name: "Gaston", password: "1234", role: "admin" },
      { id: "hernan", name: "Hernan", password: "1234", role: "investor" },
      { id: "santiago", name: "Santiago", password: "1234", role: "investor" }
    ];

    function createInitialState() {
      return {
        users: structuredClone(initialUsers),
        properties: [],
        purchases: [],
        renovations: [],
        sales: [],
        createdAt: new Date().toISOString()
      };
    }

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);

      if (!raw) {
        state = createInitialState();
        saveState();
        return;
      }

      try {
        state = JSON.parse(raw);
      } catch {
        state = createInitialState();
      }

      if (!Array.isArray(state.users)) state.users = [];
      if (!Array.isArray(state.properties)) state.properties = [];
      if (!Array.isArray(state.purchases)) state.purchases = [];
      if (!Array.isArray(state.renovations)) state.renovations = [];
      if (!Array.isArray(state.sales)) state.sales = [];

      ensureInitialUsers();
      migrateData();
      updateStatuses();
      saveState();
    }

    function ensureInitialUsers() {
      initialUsers.forEach(user => {
        const exists = state.users.some(u => u.id === user.id);
        if (!exists) state.users.push({ ...user });
      });

      state.users = state.users.filter((user, index, arr) => {
        return arr.findIndex(u => u.id === user.id) === index;
      });
    }

    function migrateData() {
      state.properties.forEach(p => {
        delete p.shares;
        delete p.participations;
        delete p.investors;
        if (!p.id) p.id = uid();
        if (!p.status) p.status = "disponible";
      });

      state.purchases.forEach(p => {
        if (!p.id) p.id = uid();
        if (!p.modality) p.modality = "escritura";
        p.priceUsd = num(p.priceUsd || p.amountUsd || 0);

        if (p.amountPaid === undefined) {
          p.amountPaid = p.modality === "boleto"
            ? num(p.amountUsd || 0)
            : p.priceUsd;
        }

        p.pendingBalance = Math.max(0, p.priceUsd - num(p.amountPaid));

        p.commissionExpense = num(p.commissionExpense);
        p.deedExpense = num(p.deedExpense);
        p.miscExpense = num(p.miscExpense);
        if (!p.payerId) p.payerId = "equipo";
      });

      state.renovations.forEach(r => {
        if (!r.id) r.id = uid();
        r.amountUsd = num(r.amountUsd);
        if (!r.payerId) r.payerId = "equipo";
      });

      state.sales.forEach(s => {
        if (!s.id) s.id = uid();
        s.salePriceUsd = num(s.salePriceUsd || s.priceUsd || 0);
        s.commissionExpense = num(s.commissionExpense);
        s.deedExpense = num(s.deedExpense);
        s.miscExpense = num(s.miscExpense);
        if (!s.payerId) s.payerId = "equipo";
      });
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function uid() {
      return "id_" + Date.now() + "_" + Math.random().toString(16).slice(2);
    }

    function num(value) {
      return Number(value || 0);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatUSD(value) {
      return new Intl.NumberFormat("es-AR", {
        style: "currency",
        currency: "USD",
        maximumFractionDigits: 0
      }).format(num(value));
    }

    function formatPct(value) {
      return `${num(value).toFixed(2)}%`;
    }

    function getInvestorUsers() {
      return state.users.filter(u => u.id !== "equipo");
    }

    function isTeamPayer(payerId) {
      return payerId === "equipo" || payerId === "Equipo";
    }

    function getUserName(id) {
      if (isTeamPayer(id)) return "Equipo";
      return state.users.find(u => u.id === id)?.name || "-";
    }

    function getPropertyById(id) {
      return state.properties.find(p => p.id === id);
    }

    function getPropertyName(id) {
      return getPropertyById(id)?.name || "-";
    }

    function getAvailableProperties() {
      return state.properties.filter(p => p.status !== "vendida");
    }

    function getPropertyInvestorShares(propertyId) {
      const investors = getInvestorUsers();
      if (!investors.length) return [];

      const equalPct = 1 / investors.length;

      return investors.map(user => ({
        userId: user.id,
        pct: equalPct
      }));
    }

    function updateStatuses() {
      state.properties.forEach(property => {
        const purchases = state.purchases.filter(p => p.propertyId === property.id);
        const renovations = state.renovations.filter(r => r.propertyId === property.id);
        const sales = state.sales.filter(s => s.propertyId === property.id);

        if (sales.length > 0) {
          property.status = "vendida";
          return;
        }

        if (renovations.length > 0) {
          property.status = "en_refaccion";
          return;
        }

        if (purchases.length > 0) {
          const agreed = purchases.reduce((sum, p) => sum + num(p.priceUsd), 0);
          const paid = purchases.reduce((sum, p) => sum + num(p.amountPaid), 0);

          property.status = paid >= agreed && agreed > 0
            ? "comprada"
            : "en_compra";
          return;
        }

        property.status = "disponible";
      });
    }

    function statusLabel(status) {
      const labels = {
        disponible: "Disponible",
        en_compra: "En compra",
        comprada: "Comprada",
        en_refaccion: "En refacción",
        vendida: "Vendida"
      };

      return labels[status] || status;
    }

    function renderStatus(status) {
      return `<span class="badge ${status}">${statusLabel(status)}</span>`;
    }

    function payerOptions(selected = "equipo") {
      const options = [
        `<option value="equipo" ${selected === "equipo" ? "selected" : ""}>Equipo</option>`
      ];

      getInvestorUsers().forEach(user => {
        options.push(`
          <option value="${user.id}" ${selected === user.id ? "selected" : ""}>
            ${escapeHtml(user.name)}
          </option>
        `);
      });

      return options.join("");
    }

    function propertyOptions(selected = "", onlyAvailable = true) {
      const list = onlyAvailable ? getAvailableProperties() : state.properties;

      if (!list.length) {
        return `<option value="">No hay propiedades disponibles</option>`;
      }

      return [
        `<option value="">Seleccionar propiedad</option>`,
        ...list.map(p => `
          <option value="${p.id}" ${selected === p.id ? "selected" : ""}>
            ${escapeHtml(p.name)} - ${statusLabel(p.status)}
          </option>
        `)
      ].join("");
    }

    function getSaleAmount(item) {
      return num(item.salePriceUsd || item.priceUsd || item.amountUsd || item.valueUsd);
    }

    function getPurchasePendingBalance(item) {
      return num(item.pendingBalance || item.balancePending || item.boletoPendingBalance);
    }

    function getPropertyFinancialResult(propertyId) {
      const purchases = state.purchases.filter(item => item.propertyId === propertyId);
      const renovations = state.renovations.filter(item => item.propertyId === propertyId);
      const sales = state.sales.filter(item => item.propertyId === propertyId);

      const purchasePaid = purchases.reduce((sum, item) => {
        return sum + num(item.amountPaid || item.amountUsd || item.priceUsd);
      }, 0);

      const purchaseExpenses = purchases.reduce((sum, item) => {
        return sum +
          num(item.commissionExpense) +
          num(item.deedExpense) +
          num(item.miscExpense);
      }, 0);

      const renovationsTotal = renovations.reduce((sum, item) => {
        return sum + num(item.amountUsd);
      }, 0);

      const saleExpenses = sales.reduce((sum, item) => {
        return sum +
          num(item.commissionExpense) +
          num(item.deedExpense) +
          num(item.miscExpense);
      }, 0);

      const pendingBoletoBalance = purchases.reduce((sum, item) => {
        return sum + getPurchasePendingBalance(item);
      }, 0);

      const grossSale = sales.reduce((sum, item) => {
        return sum + getSaleAmount(item);
      }, 0);

      const netSale = grossSale - pendingBoletoBalance;

      const effectiveInvestment =
        purchasePaid +
        purchaseExpenses +
        renovationsTotal +
        saleExpenses;

      const profit = sales.length > 0
        ? netSale - effectiveInvestment
        : 0;

      const profitability = effectiveInvestment > 0
        ? profit / effectiveInvestment * 100
        : 0;

      return {
        propertyId,
        isSold: sales.length > 0,
        purchasePaid,
        purchaseExpenses,
        renovationsTotal,
        saleExpenses,
        pendingBoletoBalance,
        grossSale,
        netSale,
        effectiveInvestment,
        profit,
        profitability
      };
    }

    function renderPropertyProfitability(propertyId) {
      const result = getPropertyFinancialResult(propertyId);

      if (!result.isSold) {
        return `<span class="muted">-</span>`;
      }

      const className = result.profitability >= 0 ? "positive" : "negative";

      return `
        <div class="${className}">
          ${formatPct(result.profitability)}
        </div>
        <div class="small muted">
          Resultado: ${formatUSD(result.profit)}
        </div>
      `;
    }

    function login(userId, password) {
      const user = state.users.find(u => u.id === userId && u.password === password);

      if (!user) {
        alert("Usuario o clave incorrecta");
        return;
      }

      currentUser = user;
      activeTab = "inicio";
      renderApp();
    }

    function logout() {
      currentUser = null;
      renderApp();
    }

    function renderLogin() {
      const users = getInvestorUsers();

      document.getElementById("app").innerHTML = `
        <div class="login-page">
          <div class="login-card">
            <h1>🏢 Altan Group</h1>
            <p class="subtitle">Gestión inmobiliaria e inversiones</p>

            <div class="field">
              <label>Usuario</label>
              <select id="loginUser">
                ${users.map(u => `<option value="${u.id}">${escapeHtml(u.name)}</option>`).join("")}
              </select>
            </div>

            <div class="field">
              <label>Clave</label>
              <input id="loginPassword" type="password" placeholder="Clave" />
            </div>

            <button class="btn" style="width:100%;" onclick="login(
              document.getElementById('loginUser').value,
              document.getElementById('loginPassword').value
            )">
              Ingresar
            </button>

            <p class="small muted" style="margin-top:14px;">
              Clave inicial para todos: 1234
            </p>
          </div>
        </div>
      `;
    }

    function renderApp() {
      if (!currentUser) {
        renderLogin();
        return;
      }

      updateStatuses();
      saveState();

      const tabs = [
        ["inicio", "🏠 Inicio"],
        ["propiedades", "🏘️ Propiedades"],
        ["compras", "🧾 Compra"],
        ["refacciones", "🛠️ Refacción"],
        ["ventas", "💰 Venta"],
        ["resumen", "📊 Resultados"]
      ];

      if (currentUser.role === "admin") {
        tabs.push(["config", "⚙️ Configuración"]);
      }

      document.getElementById("app").innerHTML = `
        <header>
          <div>
            <h1>Altan Group</h1>
            <div class="subtitle">Sesión: ${escapeHtml(currentUser.name)} · Rol: ${escapeHtml(currentUser.role)}</div>
          </div>

          <button class="btn secondary" onclick="logout()">Salir</button>
        </header>

        <main>
          <div class="tabs">
            ${tabs.map(([id, label]) => `
              <button class="tab ${activeTab === id ? "active" : ""}" onclick="setTab('${id}')">
                ${label}
              </button>
            `).join("")}
          </div>

          <div id="content">
            ${renderTab()}
          </div>
        </main>
      `;
    }

    function setTab(tab) {
      activeTab = tab;
      renderApp();
    }

    function renderTab() {
      if (activeTab === "inicio") return renderHome();
      if (activeTab === "propiedades") return renderProperties();
      if (activeTab === "compras") return renderPurchases();
      if (activeTab === "refacciones") return renderRenovations();
      if (activeTab === "ventas") return renderSales();
      if (activeTab === "resumen") return renderSummary();
      if (activeTab === "config") return renderConfig();

      return renderHome();
    }

    function renderHome() {
      const totalProperties = state.properties.length;
      const sold = state.properties.filter(p => p.status === "vendida").length;
      const available = state.properties.filter(p => p.status === "disponible").length;

      const totalInvestment = state.properties.reduce((sum, p) => {
        return sum + getPropertyFinancialResult(p.id).effectiveInvestment;
      }, 0);

      const totalNetSale = state.properties.reduce((sum, p) => {
        return sum + getPropertyFinancialResult(p.id).netSale;
      }, 0);

      const totalProfit = state.properties.reduce((sum, p) => {
        return sum + getPropertyFinancialResult(p.id).profit;
      }, 0);

      return `
        <div class="grid grid-4">
          <div class="kpi">
            <div class="label">Propiedades</div>
            <div class="value">${totalProperties}</div>
          </div>

          <div class="kpi">
            <div class="label">Disponibles</div>
            <div class="value">${available}</div>
          </div>

          <div class="kpi">
            <div class="label">Vendidas</div>
            <div class="value">${sold}</div>
          </div>

          <div class="kpi">
            <div class="label">Resultado total</div>
            <div class="value ${totalProfit >= 0 ? "positive" : "negative"}">${formatUSD(totalProfit)}</div>
          </div>
        </div>

        <div class="card">
          <h3>📌 Resumen general</h3>
          <div class="grid grid-3">
            <div class="kpi">
              <div class="label">Inversión efectiva</div>
              <div class="value">${formatUSD(totalInvestment)}</div>
            </div>

            <div class="kpi">
              <div class="label">Venta neta</div>
              <div class="value">${formatUSD(totalNetSale)}</div>
            </div>

            <div class="kpi">
              <div class="label">Rentabilidad total</div>
              <div class="value ${totalProfit >= 0 ? "positive" : "negative"}">
                ${totalInvestment > 0 ? formatPct(totalProfit / totalInvestment * 100) : "0.00%"}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderProperties() {
      const editingProperty = editing.propertyId
        ? state.properties.find(p => p.id === editing.propertyId)
        : null;

      return `
        <div class="card">
          <h3>🏘️ ${editingProperty ? "Editar propiedad" : "Nueva propiedad"}</h3>

          <div class="notice">
            Las participaciones fueron eliminadas de la solapa Propiedades.
            Cuando paga el Equipo, la erogación se reparte automáticamente en partes iguales entre los inversores.
          </div>

    function saveProperty() {
      const name = document.getElementById("propertyName").value.trim();
      const type = document.getElementById("propertyType").value.trim();
      const address = document.getElementById("propertyAddress").value.trim();
      const notes = document.getElementById("propertyNotes").value.trim();

      if (!name) {
        alert("Ingresá el nombre de la propiedad");
        return;
      }

      if (editing.propertyId) {
        const property = state.properties.find(p => p.id === editing.propertyId);
        property.name = name;
        property.type = type;
        property.address = address;
        property.notes = notes;
        property.updatedAt = new Date().toISOString();

        delete property.shares;
        delete property.participations;
        delete property.investors;
      } else {
        state.properties.push({
          id: uid(),
          name,
          type,
          address,
          notes,
          status: "disponible",
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        });
      }

      editing.propertyId = null;
      updateStatuses();
      saveState();
      renderApp();
    }

    function deleteProperty(id) {
      const hasOps =
        state.purchases.some(p => p.propertyId === id) ||
        state.renovations.some(r => r.propertyId === id) ||
        state.sales.some(s => s.propertyId === id);

      if (hasOps) {
        alert("No se puede eliminar una propiedad con operaciones cargadas.");
        return;
      }

      if (!confirm("¿Eliminar propiedad?")) return;

      state.properties = state.properties.filter(p => p.id !== id);
      saveState();
      renderApp();

    function handlePurchaseModalityChange() {
      const modality = document.getElementById("purchaseModality")?.value;
      const price = num(document.getElementById("purchasePrice")?.value);
      const paidInput = document.getElementById("purchasePaid");
      const pendingInput = document.getElementById("purchasePending");

      if (!paidInput || !pendingInput) return;

      if (modality === "escritura") {
        paidInput.value = price || "";
        pendingInput.value = 0;
      } else {
        const paid = num(paidInput.value);
        pendingInput.value = Math.max(0, price - paid);
      }
    }

    function savePurchase() {
      const propertyId = document.getElementById("purchaseProperty").value;
      const property = getPropertyById(propertyId);

      if (!property) {
        alert("Seleccioná una propiedad");
        return;
      }

      if (property.status === "vendida") {
        alert("No se puede cargar compra sobre una propiedad vendida.");
        return;
      }

      const modality = document.getElementById("purchaseModality").value;
      const priceUsd = num(document.getElementById("purchasePrice").value);
      let amountPaid = num(document.getElementById("purchasePaid").value);

      if (priceUsd <= 0) {
        alert("Ingresá el precio total acordado.");
        return;
      }

      if (modality === "escritura") {
        amountPaid = priceUsd;
      }

      if (amountPaid <= 0) {
        alert("Ingresá el monto efectivamente abonado.");
        return;
      }

      if (amountPaid > priceUsd) {
        alert("El monto abonado no puede superar el precio acordado.");
        return;
      }

      const data = {
        propertyId,
        modality,
        priceUsd,
        amountPaid,
        pendingBalance: Math.max(0, priceUsd - amountPaid),
        payerId: document.getElementById("purchasePayer").value,
        commissionExpense: num(document.getElementById("purchaseCommission").value),
        deedExpense: num(document.getElementById("purchaseDeed").value),
        miscExpense: num(document.getElementById("purchaseMisc").value),
        notes: document.getElementById("purchaseNotes").value.trim(),
        updatedAt: new Date().toISOString()
      };

      if (editing.purchaseId) {
        const item = state.purchases.find(p => p.id === editing.purchaseId);
        Object.assign(item, data);
      } else {
        state.purchases.push({
          id: uid(),
          ...data,
          createdAt: new Date().toISOString()
        });
      }

      editing.purchaseId = null;
      updateStatuses();
      saveState();
      renderApp();
    }

    function renderResultsBarChart() {
      const soldProperties = state.properties.filter(property => {

        return `

      const results = soldProperties.map(property => {
        const result = getPropertyFinancialResult(property.id);

        return {

      });

      const maxValue = Math.max(
        1,
        ...results.map(item => item.effectiveInvestment),
        ...results.map(item => item.netSale)
      );

      const rows = results.map(item => {
        const investmentWidth = Math.max(2, item.effectiveInvestment / maxValue * 100);

    function getErogationsByInvestor() {
      const details = [];
      const totals = {};

      getInvestorUsers().forEach(user => {
        totals[user.id] = 0;
      });

      function addErogation({ propertyId, concept, payerId, amount }) {
        amount = num(amount);
        if (amount <= 0) return;

        if (isTeamPayer(payerId)) {
          const shares = getPropertyInvestorShares(propertyId);

          shares.forEach(share => {
            const assigned = amount * share.pct;
            totals[share.userId] = num(totals[share.userId]) + assigned;

            details.push({
              propertyId,
              concept,
              originalPayer: "Equipo",
              investorId: share.userId,
              assigned,
              criteria: "Equipo: reparto en partes iguales"
            });
          });
        } else {
          totals[payerId] = num(totals[payerId]) + amount;

          details.push({
            propertyId,
            concept,
            originalPayer: getUserName(payerId),
            investorId: payerId,
            assigned: amount,
            criteria: "Pago directo del inversor"
          });
        }
      }

      state.purchases.forEach(p => {
        addErogation({
          propertyId: p.propertyId,
          concept: "Compra - monto abonado",
          payerId: p.payerId,
          amount: p.amountPaid
        });

        addErogation({
          propertyId: p.propertyId,
          concept: "Compra - comisión inmobiliaria",
          payerId: p.payerId,
          amount: p.commissionExpense
        });

        addErogation({
          propertyId: p.propertyId,
          concept: "Compra - escrituración",
          payerId: p.payerId,
          amount: p.deedExpense
        });

        addErogation({
          propertyId: p.propertyId,
          concept: "Compra - gastos varios",
          payerId: p.payerId,
          amount: p.miscExpense
        });
      });

      state.renovations.forEach(r => {
        addErogation({
          propertyId: r.propertyId,
          concept: "Refacción",
          payerId: r.payerId,
          amount: r.amountUsd
        });
      });

      state.sales.forEach(s => {
        addErogation({
          propertyId: s.propertyId,
          concept: "Venta - comisión inmobiliaria",
          payerId: s.payerId,
          amount: s.commissionExpense
        });

        addErogation({
          propertyId: s.propertyId,
          concept: "Venta - escrituración",
          payerId: s.payerId,
          amount: s.deedExpense
        });

        addErogation({
          propertyId: s.propertyId,
          concept: "Venta - gastos varios",
          payerId: s.payerId,
          amount: s.miscExpense
        });
      });

      return { totals, details };
    }

    function renderSummary() {
      const totalInvestment = state.properties.reduce((sum, p) => {
        return sum + getPropertyFinancialResult(p.id).effectiveInvestment;
      }, 0);

      const totalGrossSale = state.properties.reduce((sum, p) => {
        return sum + getPropertyFinancialResult(p.id).grossSale;
      }, 0);

      const totalNetSale = state.properties.reduce((sum, p) => {
        return sum + getPropertyFinancialResult(p.id).netSale;
      }, 0);

      const totalProfit = state.properties.reduce((sum, p) => {
        return sum + getPropertyFinancialResult(p.id).profit;
      }, 0);

      const profitability = totalInvestment > 0
        ? totalProfit / totalInvestment * 100
        : 0;

      const erogations = getErogationsByInvestor();

      return `
        <div class="grid grid-4">
          <div class="kpi">
            <div class="label">Inversión efectiva</div>
            <div class="value">${formatUSD(totalInvestment)}</div>
          </div>

          <div class="kpi">
            <div class="label">Venta bruta</div>
            <div class="value">${formatUSD(totalGrossSale)}</div>
          </div>

          <div class="kpi">
            <div class="label">Venta neta</div>
            <div class="value">${formatUSD(totalNetSale)}</div>
          </div>

          <div class="kpi">
            <div class="label">Rentabilidad</div>
            <div class="value ${totalProfit >= 0 ? "positive" : "negative"}">${formatPct(profitability)}</div>
          </div>
        </div>

        ${renderResultsBarChart()}

        <div class="card">
          <h3>📈 Resultados por propiedad</h3>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Propiedad</th>
                  <th>Estado</th>
                  <th>Inversión efectiva</th>
                  <th>Venta bruta</th>
                  <th>Saldo boleto</th>
                  <th>Venta neta</th>
                  <th>Resultado</th>
                  <th>Rentabilidad</th>
                </tr>
              </thead>

              <tbody>
                ${state.properties.length ? state.properties.map(p => {
                  const r = getPropertyFinancialResult(p.id);
                  const cls = r.profit >= 0 ? "positive" : "negative";

                  return `
                    <tr>
                      <td>${escapeHtml(p.name)}</td>
                      <td>${renderStatus(p.status)}</td>
                      <td>${formatUSD(r.effectiveInvestment)}</td>
                      <td>${formatUSD(r.grossSale)}</td>
                      <td>${formatUSD(r.pendingBoletoBalance)}</td>
                      <td>${formatUSD(r.netSale)}</td>
                      <td class="${r.isSold ? cls : ""}">${r.isSold ? formatUSD(r.profit) : "-"}</td>
                      <td class="${r.isSold ? cls : ""}">${r.isSold ? formatPct(r.profitability) : "-"}</td>
                    </tr>
                  `;
                }).join("") : `
                  <tr>
                    <td colspan="8" class="muted">No hay propiedades cargadas.</td>
                  </tr>
                `}
              </tbody>
            </table>
          </div>
        </div>

        <div class="card">
          <h3>👥 Erogaciones asignadas por inversor</h3>

          <div class="grid grid-3">
            ${getInvestorUsers().map(user => `
              <div class="kpi">
                <div class="label">${escapeHtml(user.name)}</div>
                <div class="value">${formatUSD(erogations.totals[user.id] || 0)}</div>
              </div>
            `).join("")}
          </div>
        </div>

        <div class="card">
          <h3>🔎 Detalle de erogaciones</h3>

          <div class="notice">
            Cuando el pagador original es Equipo, el importe se reparte en partes iguales entre Gaston, Hernan y Santiago.
            En ventas solo se suman gastos reales; el saldo pendiente de boleto no se considera erogación.
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Propiedad</th>
                  <th>Concepto</th>
                  <th>Pagador original</th>
                  <th>Inversor asignado</th>
                  <th>Monto asignado</th>
                  <th>Criterio</th>
                </tr>
              </thead>

              <tbody>
                ${erogations.details.length ? erogations.details.map(d => `
                  <tr>
                    <td>${escapeHtml(getPropertyName(d.propertyId))}</td>
                    <td>${escapeHtml(d.concept)}</td>
                    <td>${escapeHtml(d.originalPayer)}</td>
                    <td>${escapeHtml(getUserName(d.investorId))}</td>
                    <td>${formatUSD(d.assigned)}</td>
                    <td>${escapeHtml(d.criteria)}</td>
                  </tr>
                `).join("") : `
                  <tr>
                    <td colspan="6" class="muted">No hay erogaciones registradas.</td>
                  </tr>
                `}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function renderConfig() {
      if (currentUser.role !== "admin") {
        return `<div class="card">No tenés permisos para acceder.</div>`;
      }

      return `
        <div class="card">
          <h3>⚙️ Configuración de usuarios</h3>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Usuario</th>
                  <th>Nombre</th>
                  <th>Clave</th>
                  <th>Rol</th>
                  <th>Acción</th>
                </tr>
              </thead>

              <tbody>
                ${getInvestorUsers().map(user => `
                  <tr>
                    <td>${escapeHtml(user.id)}</td>
                    <td>
                      <input id="userName_${user.id}" value="${escapeHtml(user.name)}" />
                    </td>
                    <td>
                      <input id="userPass_${user.id}" value="${escapeHtml(user.password)}" />
                    </td>
                    <td>
                      <select id="userRole_${user.id}">
                        <option value="admin" ${user.role === "admin" ? "selected" : ""}>Admin</option>
                        <option value="investor" ${user.role === "investor" ? "selected" : ""}>Inversor</option>
                      </select>
                    </td>
                    <td>
                      <button class="btn small success" onclick="saveUserConfig('${user.id}')">Guardar</button>
                    </td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </div>

        <div class="card">
          <h3>📦 Datos</h3>

          <div class="actions">
            <button class="btn secondary" onclick="exportData()">Exportar JSON</button>
            <button class="btn warning" onclick="document.getElementById('importFile').click()">Importar JSON</button>
            <button class="btn danger" onclick="resetAllData()">Resetear todo</button>
          </div>

          <input id="importFile" type="file" accept="application/json" style="display:none;" onchange="importData(event)" />
        </div>
      `;
    }

    function saveUserConfig(userId) {
      const user = state.users.find(u => u.id === userId);

      if (!user) return;

      user.name = document.getElementById(`userName_${userId}`).value.trim() || user.name;
      user.password = document.getElementById(`userPass_${userId}`).value.trim() || user.password;
      user.role = document.getElementById(`userRole_${userId}`).value;

      if (currentUser.id === userId) {
        currentUser = user;
      }

      saveState();
      renderApp();
    }

    function exportData() {
      const blob = new Blob([JSON.stringify(state, null, 2)], {
        type: "application/json"
      });

      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "altan_group_inversiones.json";
      a.click();
      URL.revokeObjectURL(url);
    }

    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = function(e) {
        try {
          const imported = JSON.parse(e.target.result);

          if (!confirm("Esto reemplazará todos los datos actuales. ¿Continuar?")) return;

          state = imported;
          ensureInitialUsers();
          migrateData();
          updateStatuses();
          saveState();
          renderApp();
        } catch {
          alert("Archivo inválido.");
        }
      };

      reader.readAsText(file);
    }

    function resetAllData() {
      if (!confirm("¿Seguro que querés borrar toda la información?")) return;

      localStorage.removeItem(STORAGE_KEY);
      state = createInitialState();
      currentUser = null;
      saveState();
      renderApp();
    }

    loadState();
    renderApp();
  </script>
</body>
</html>
